<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REAL ACTION BIBLE CAMP 2026 SG 1</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-flame">
      <i class="fa-solid fa-fire"></i>
    </div>
    <div class="header-text">
      <span class="header-label">REAL ACTION</span>
      <h1 class="header-title">BIBLE CAMP 2026</h1>
      <span class="header-sub">SG 1 — Monitoring & Progress Tracker</span>
    </div>
    <div class="header-flame">
      <i class="fa-solid fa-fire"></i>
    </div>
  </div>
</header>

<!-- DASHBOARD -->
<main id="dashboard" class="dashboard">
  <div class="dashboard-intro">
    <p>Pilih peserta untuk mengisi atau melihat laporan tindakan nyata pasca Bible Camp.</p>
  </div>
  <div class="participant-grid" id="participantGrid">
    <!-- Cards generated by JS -->
  </div>
</main>

<!-- FORM MODAL -->
<div id="formModal" class="modal hidden">
  <div class="modal-overlay" onclick="closeModal()"></div>
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>

    <!-- IDENTITY -->
    <div class="form-section identity-section">
      <div class="section-badge"><i class="fa-solid fa-user"></i> Identitas</div>
      <div class="identity-grid">
        <div class="field-group">
          <label>Nama Peserta</label>
          <input type="text" id="f_name" readonly class="readonly-input"/>
        </div>
        <div class="field-group">
          <label>Pilihan Lingkungan</label>
          <div class="radio-group">
            <label class="radio-label"><input type="radio" name="lingkungan" value="KTB" /> KTB</label>
            <label class="radio-label"><input type="radio" name="lingkungan" value="Keluarga" /> Keluarga</label>
            <label class="radio-label"><input type="radio" name="lingkungan" value="Sekolah" /> Sekolah</label>
          </div>
        </div>
      </div>
    </div>

    <!-- KAPSEL 1 -->
    <div class="kapsel-header kapsel1-header">
      <div class="kapsel-badge">KAPSEL 1</div>
      <span>4 Minggu Tindakan Nyata</span>
    </div>

    <div id="kapsel1Weeks" class="weeks-container">
      <!-- Generated by JS -->
    </div>

    <div class="week-controls">
      <button class="btn-add" onclick="addWeek(1)"><i class="fa-solid fa-plus"></i> Tambah Minggu</button>
      <button class="btn-remove" onclick="removeWeek(1)"><i class="fa-solid fa-minus"></i> Hapus Minggu</button>
    </div>

    <!-- EVALUASI KAPSEL 1 -->
    <div class="eval-section eval1">
      <div class="eval-header"><i class="fa-solid fa-clipboard-check"></i> Evaluasi Bulan Kapsel 1</div>
      <div class="eval-grid">
        <div class="field-group">
          <label>Perkembangan</label>
          <textarea id="eval1_perkembangan" rows="3" placeholder="Tuliskan perkembangan yang terjadi..."></textarea>
        </div>
        <div class="field-group">
          <label>Tantangan</label>
          <textarea id="eval1_tantangan" rows="3" placeholder="Tuliskan tantangan yang dihadapi..."></textarea>
        </div>
        <div class="field-group">
          <label>Pembelajaran</label>
          <textarea id="eval1_pembelajaran" rows="3" placeholder="Tuliskan hal yang dipelajari..."></textarea>
        </div>
        <div class="field-group">
          <label>Dampak yang Terlihat</label>
          <textarea id="eval1_dampak" rows="3" placeholder="Tuliskan dampak nyata yang sudah terlihat..."></textarea>
        </div>
      </div>
      <div class="field-group" style="margin-top:16px">
        <label>Rangkuman Kapsel 1</label>
        <textarea id="eval1_rangkuman" rows="4" placeholder="Tuliskan rangkuman perjalanan Kapsel 1..."></textarea>
      </div>
    </div>

    <!-- KAPSEL 2 -->
    <div class="kapsel-header kapsel2-header">
      <div class="kapsel-badge">KAPSEL 2</div>
      <span>4 Minggu Penerapan PA</span>
    </div>

    <div id="kapsel2Weeks" class="weeks-container">
      <!-- Generated by JS -->
    </div>

    <div class="week-controls">
      <button class="btn-add" onclick="addWeek(2)"><i class="fa-solid fa-plus"></i> Tambah Minggu</button>
      <button class="btn-remove" onclick="removeWeek(2)"><i class="fa-solid fa-minus"></i> Hapus Minggu</button>
    </div>

    <!-- EVALUASI KAPSEL 2 -->
    <div class="eval-section eval2">
      <div class="eval-header"><i class="fa-solid fa-clipboard-check"></i> Evaluasi Bulan Kapsel 2</div>
      <div class="eval-grid">
        <div class="field-group">
          <label>Perkembangan</label>
          <textarea id="eval2_perkembangan" rows="3" placeholder="Tuliskan perkembangan yang terjadi..."></textarea>
        </div>
        <div class="field-group">
          <label>Tantangan</label>
          <textarea id="eval2_tantangan" rows="3" placeholder="Tuliskan tantangan yang dihadapi..."></textarea>
        </div>
        <div class="field-group">
          <label>Pembelajaran</label>
          <textarea id="eval2_pembelajaran" rows="3" placeholder="Tuliskan hal yang dipelajari..."></textarea>
        </div>
        <div class="field-group">
          <label>Dampak yang Terlihat</label>
          <textarea id="eval2_dampak" rows="3" placeholder="Tuliskan dampak nyata yang sudah terlihat..."></textarea>
        </div>
      </div>
      <div class="field-group" style="margin-top:16px">
        <label>Rangkuman Kapsel 2</label>
        <textarea id="eval2_rangkuman" rows="4" placeholder="Tuliskan rangkuman perjalanan Kapsel 2..."></textarea>
      </div>
    </div>

    <!-- SAVE BUTTON -->
    <div class="save-area">
      <button class="btn-save" onclick="saveData()">
        <i class="fa-solid fa-floppy-disk"></i> Simpan Data
      </button>
      <div id="saveStatus" class="save-status hidden"></div>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
